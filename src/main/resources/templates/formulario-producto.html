<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${producto.id == null ? 'Añadir Producto' : 'Editar Producto'}">Gestión Tienda</title>
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Estilos compartidos -->
    <link rel="stylesheet" th:href="@{/css/navfooter.css}">
    <!-- Estilos de formulario -->
    <link rel="stylesheet" th:href="@{/css/formulario-producto.css}">
</head>
<body>

    <header th:replace="~{common/navfooter :: navbar}"></header>

    <main class="form-container">
        
        <div class="form-card">
            <h1 class="form-titulo">
                <i th:class="${producto.id == null ? 'fa-solid fa-box-open' : 'fa-solid fa-pen-to-square'}"></i>
                <span th:text="${producto.id == null ? 'Añadir Nuevo Producto' : 'Editar Producto'}"></span>
            </h1>
            <p class="form-subtitulo" th:text="${producto.id == null ? 'Agrega un artículo al catálogo de la tienda.' : 'Modifica los datos del artículo seleccionado.'}"></p>

            <form th:action="@{/tienda/guardar}" th:object="${producto}" method="post" class="dynamic-form">
                
                <!-- Campo oculto para ID -->
                <input type="hidden" th:field="*{id}">

                <div class="input-group">
                    <label for="nombre"><i class="fa-solid fa-tag"></i> Nombre del Producto</label>
                    <input type="text" id="nombre" th:field="*{nombre}" placeholder="Ej. Pienso Royal Canin" required>
                </div>

                <div class="input-group">
                    <label for="categoria"><i class="fa-solid fa-shapes"></i> Categoría</label>
                    <select id="categoria" th:field="*{categoria}" required>
                        <option value="">Selecciona una categoría...</option>
                        <option value="Alimentación">Alimentación</option>
                        <option value="Accesorios">Accesorios</option>
                        <option value="Higiene">Higiene</option>
                        <option value="Salud">Salud</option>
                        <option value="Juguetes">Juguetes</option>
                    </select>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="precio"><i class="fa-solid fa-coins"></i> Precio (€)</label>
                        <input type="number" step="0.01" id="precio" th:field="*{precio}" placeholder="0.00" required>
                    </div>

                    <div class="input-group">
                        <label for="stock"><i class="fa-solid fa-cubes"></i> Stock (Unidades)</label>
                        <input type="number" id="stock" th:field="*{stock}" placeholder="0" required min="0">
                    </div>
                </div>

                <div class="input-group">
                    <label for="descripcion"><i class="fa-solid fa-align-left"></i> Descripción</label>
                    <textarea id="descripcion" th:field="*{descripcion}" rows="4" placeholder="Detalles de lo que incluye o características..." required></textarea>
                </div>

                <div class="input-group">
                    <label for="imagenUrl"><i class="fa-solid fa-image"></i> URL de la Imagen (Opcional)</label>
                    <input type="url" id="imagenUrl" th:field="*{imagenUrl}" placeholder="https://ejemplo.com/fotodelproducto.jpg">
                </div>

                <div class="form-actions">
                    <a th:href="@{/tienda}" class="btn-secondary">
                        <i class="fa-solid fa-arrow-left"></i> Volver
                    </a>
                    <button type="submit" class="btn-primary">
                        <i class="fa-solid fa-floppy-disk"></i> Guardar Producto
                    </button>
                </div>
            </form>
        </div>

    </main>

    <footer th:replace="~{common/navfooter :: pie}"></footer>

</body>
</html>
