<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citas</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/navfooter.css">
    <link rel="stylesheet" href="css/citas/agenda.css">
</head>
<body>

<header th:replace="~{common/navfooter :: navbar}">
    <!-- navbar -->
</header>

<main class="citas-main">

    <div class="citas-cabecera">
        <div>
            <h1 class="citas-titulo">Gestión de Citas</h1>
            <p class="citas-subtitulo">Panel de administración de la agenda de la clínica</p>
        </div>
        <a th:href="@{/citas/reservar}" href="#" class="btn-nueva-cita">
            <i class="fa-solid fa-plus"></i> Nueva Cita
        </a>
    </div>

    <div class="citas-tarjeta">

        <div class="tabla-info">
            Mostrando <strong th:text="${#lists.size(citas)}">0</strong> citas programadas
        </div>

        <div class="tabla-contenedor">
            <table class="tabla-citas">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Fecha y Hora</th>
                        <th>Mascota</th>
                        <th>Propietario</th>
                        <th>Motivo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${citas}">
                        <td class="col-id" th:text="${c.id}"></td>

                        <td th:text="${#temporals.format(c.fechaHora, 'dd/MM/yyyy HH:mm')}"></td>

                        <td><span class="badge-mascota" th:text="${c.mascota?.nombre}"></span></td>

                        <td class="col-propietario" th:text="${c.mascota?.cliente?.usuario?.nombreCompleto}"></td>

                        <td th:text="${c.motivo}"></td>
                        
                        <td class="col-acciones">
                            <a class="btn-eliminar"
                               th:href="@{/citas/cancelar/{id}(id=${c.id})}"
                               onclick="return confirm('⚠️ ¿Estás seguro de que deseas eliminar esta cita de forma permanente?')">
                                <i class="fa-solid fa-trash"></i> Eliminar
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="tabla-pie">
            Mostrando <span th:text="${#lists.size(citas)}">0</span> citas programadas.
        </div>

    </div>

</main>
  <!-- FOOTER -->
    <footer th:replace="~{common/navfooter :: pie}"></footer>

</body>
</html>
