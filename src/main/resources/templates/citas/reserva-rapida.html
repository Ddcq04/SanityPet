<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SanityPet - Reserva cita</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; background-color: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #34495e; }
        select, input { width: 100%; padding: 10px; border: 1px solid #dce4ec; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        button { background-color: #3498db; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Nueva Cita</h1>
        
        <form id="citaForm" th:action="@{/citas/reservar/guardar}" th:object="${cita}" method="post">
            
            <div class="form-group">
                <label for="mascota">Seleccionar Mascota:</label>
					<select th:field="*{mascota}" id="mascota" class="form-control" required>
					    <option value="">-- Seleccione una mascota --</option>
					    
					    <option th:each="m : ${listaMascotas}" 
					            th:value="${m.id}" 
					            th:text="${m.nombre} + ' (' + ${m.cliente?.usuario?.nombreCompleto} + ')'">
					    </option>
					</select>
            </div>

            <div class="form-group">
                <label>1. Elige el Día:</label>
                <input type="date" id="fechaInput" required 
                       th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
            </div>

            <div class="form-group">
                <label>2. Elige la Hora:</label>
                <select id="horaSelect" th:field="*{fechaHora}" required>
                    <option value="">-- Seleccione un día primero --</option>
                </select>
            </div>

            <div class="form-group">
                <label>Motivo:</label>
                <input type="text" th:field="*{motivo}" placeholder="Ej: Vacunación" required>
            </div>

            <button type="submit">Confirmar Reserva</button>
        </form>

        <a th:href="@{/home}" class="back-link">← Volver al inicio</a>
    </div>

    <script th:inline="javascript">
        // --- LÓGICA 1: CARGAR HORAS LIBRES ---
        document.getElementById('fechaInput').addEventListener('change', function() {
            const fecha = this.value;
            const select = document.getElementById('horaSelect');
            select.innerHTML = '<option value="">Cargando...</option>';

            fetch('/citas/horas-disponibles?fecha=' + fecha)
                .then(res => res.json())
                .then(horas => {
                    select.innerHTML = '<option value="">-- Selecciona hora --</option>';
                    horas.forEach(h => {
                        const option = new Option(h, fecha + 'T' + h + ':00');
                        select.add(option);
                    });
                });
        });

        // --- LÓGICA 2: ENVÍO ASÍNCRONO (AJAX) ---
        document.getElementById('citaForm').addEventListener('submit', function(e) {
            e.preventDefault(); 

            const formData = new FormData(this);

            fetch(this.action, {
                method: 'POST',
                body: formData,
                // Si tienes Spring Security activado, fetch enviará automáticamente el token CSRF 
                // si el campo oculto está dentro del FormData.
            })
            .then(async response => {
                const data = await response.json();
                if (response.ok) {
                    alert(data.mensaje);
                    window.location.href = '/citas'; // Redirigir al éxito
                } else {
                    alert("⚠️ Error: " + data.error);
                }
            })
            .catch(err => {
                alert("❌ Error de conexión con el servidor");
            });
        });
    </script>

</body>
</html>
