<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>SanityPet - Iniciar Sesión</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; }
        .login-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        .error { color: red; margin-bottom: 1rem; font-size: 0.9rem; }
        .logout { color: green; margin-bottom: 1rem; font-size: 0.9rem; }
        input { width: 100%; padding: 0.5rem; margin: 0.5rem 0; box-sizing: border-box; }
        button { width: 100%; padding: 0.7rem; background-color: #2c3e50; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #34495e; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>SanityPet Login</h2>

    <div th:if="${param.error}" class="error">
        Usuario o contraseña incorrectos.
    </div>

    <div th:if="${param.logout}" class="logout">
        Has cerrado sesión correctamente.
    </div>

    <form th:action="@{/login}" method="post">
        <div>
            <label>Usuario:</label>
            <input type="text" name="username" required autofocus />
        </div>
        <div>
            <label>Contraseña:</label>
            <input type="password" name="password" required />
        </div>
        <div>
            <button type="submit">Entrar</button>
        </div>
    </form>
</div>

</body>
</html>
