<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Virtual</title>
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Estilos compartidos -->
    <link rel="stylesheet" th:href="@{/css/common/navfooter.css}">
    <!-- Estilos propios de la tienda -->
    <link rel="stylesheet" th:href="@{/css/tienda.css}">
</head>
<body>

    <header th:replace="~{common/navfooter :: navbar}"></header>

    <main class="tienda-container">

        <div class="tienda-header">
            <div>
                <h1 class="tienda-titulo">Nuestra Tienda <i class="fa-solid fa-store"></i></h1>
                <p class="tienda-subtitulo">Los mejores productos seleccionados por veterinarios para el bienestar de tu compañero.</p>
            </div>

            <!-- Botón exclusivo para administradores -->
            <div th:if="${isAdmin}" class="admin-actions">
                <a th:href="@{/tienda/nuevo}" class="btn-nuevo-producto">
                    <i class="fa-solid fa-plus"></i> Añadir Producto
                </a>
            </div>
        </div>

        <!-- FILTROS -->
        <div class="tienda-filtros">
            <div class="filtros-categorias">
                <button class="filtro-btn activo" data-categoria="todos">Todos</button>
                <button class="filtro-btn" data-categoria="Alimentación">Alimentación</button>
                <button class="filtro-btn" data-categoria="Salud">Salud</button>
                <button class="filtro-btn" data-categoria="Higiene">Higiene</button>
                <button class="filtro-btn" data-categoria="Accesorios">Accesorios</button>
                <button class="filtro-btn" data-categoria="Suplementos">Suplementos</button>
                <button class="filtro-btn" data-categoria="Juguetes">Juguetes</button>
            </div>
            <div class="filtros-buscar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="buscador" placeholder="Buscar producto...">
            </div>
        </div>

        <div class="productos-grid">
            <!-- Iteramos sobre cada producto -->
            <div th:each="producto : ${productos}"
                 class="producto-card"
                 th:attr="data-categoria=${producto.categoria}, data-nombre=${#strings.toLowerCase(producto.nombre)}">
                <div class="producto-imagen-placeholder">
                    <!-- Si tiene imagen -->
                    <img th:if="${not #strings.isEmpty(producto.imagenUrl)}"
                         th:src="${producto.imagenUrl}"
                         alt="Foto de producto"
                         style="width: 100%; height: 100%; object-fit: cover;">
                    <!-- Si NO tiene imagen, se muestra el icono por defecto -->
                    <i th:unless="${not #strings.isEmpty(producto.imagenUrl)}" class="fa-solid fa-box-open"></i>
                    <div th:if="${isAdmin}" class="admin-card-actions">
                        <a th:href="@{/tienda/editar/{id}(id=${producto.id})}" class="btn-icon edit" title="Editar">
                            <i class="fa-solid fa-pen"></i>
                        </a>
                        <a th:href="@{/tienda/eliminar/{id}(id=${producto.id})}" class="btn-icon delete" title="Eliminar">
                            <i class="fa-solid fa-trash"></i>
                        </a>
                    </div>
                </div>
                <div class="producto-info">
                    <span class="producto-categoria" th:text="${producto.categoria}">Categoría</span>
                    <h3 class="producto-nombre" th:text="${producto.nombre}">Nombre del Producto</h3>
                    <p class="producto-descripcion" th:text="${producto.descripcion}">Descripción corta del producto.</p>

                    <div class="producto-footer">
                        <span class="producto-precio" th:text="'€' + ${producto.precio}">€0.00</span>
                        <span class="producto-stock" th:classappend="${producto.stock > 0} ? 'stock-ok' : 'stock-out'">
                            <i th:class="${producto.stock > 0} ? 'fa-solid fa-check-circle' : 'fa-solid fa-times-circle'"></i>
                            <span th:text="${producto.stock > 0} ? 'Stock: ' + ${producto.stock} : 'Agotado'"></span>
                        </span>
                    </div>
                </div>
            </div>

            <!-- Mensaje si no hay productos -->
            <div th:if="${#lists.isEmpty(productos)}" class="sin-productos">
                <i class="fa-solid fa-ghost"></i>
                <p>No hay productos disponibles en la tienda por el momento.</p>
            </div>
        </div>

    </main>

    <footer th:replace="~{common/navfooter :: pie}"></footer>

    <script>
        const tarjetas = document.querySelectorAll('.producto-card');
        const botones  = document.querySelectorAll('.filtro-btn');
        const buscador = document.getElementById('buscador');
        let categoriaActiva = 'todos';

        function filtrar() {
            const texto = buscador.value.toLowerCase().trim();
            tarjetas.forEach(card => {
                const coincideCategoria = categoriaActiva === 'todos' || card.dataset.categoria === categoriaActiva;
                const coincideTexto     = card.dataset.nombre.includes(texto);
                card.style.display = (coincideCategoria && coincideTexto) ? '' : 'none';
            });
        }

        botones.forEach(btn => {
            btn.addEventListener('click', () => {
                botones.forEach(b => b.classList.remove('activo'));
                btn.classList.add('activo');
                categoriaActiva = btn.dataset.categoria;
                filtrar();
            });
        });

        buscador.addEventListener('input', filtrar);
    </script>

</body>
</html>
