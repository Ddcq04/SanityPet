<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Mascotas </title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{css/navfooter.css}">
    <link rel="stylesheet" th:href="@{css/mascotas/listadomascotas.css}">
</head>
<body>

<header th:replace="~{common/navfooter :: navbar}">
    <!-- navbar -->
</header>

<main class="contenido-principal">

    <div class="cabecera-pagina">
        <div>
            <h1 class="titulo-pagina">Listado de Mascotas</h1>
            <p class="subtitulo-pagina">Consulta todos los pacientes registrados en la clínica</p>
        </div>
        <a th:href="@{/mascotas/nueva}" href="#" class="boton-nuevo">
            <i class="fa-solid fa-plus"></i> Nueva Mascota
        </a>
    </div>

    <div class="tarjeta-tabla">

        <!-- buscar mascota-->
        <div class="barra-filtros">
            <form th:action="@{/mascotas/buscar}" method="get" class="formulario-filtros">
                <div class="input-busqueda">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" name="nombre" th:value="${nombreSeleccionado}" placeholder="Nombre...">
                </div>
                <select class="filtro-select" name="especie">
                    <option value="">Todas las especies</option>
                    <option value="Perro" th:selected="${especieSeleccionada == 'Perro'}">Perro</option>
                    <option value="Gato" th:selected="${especieSeleccionada == 'Gato'}">Gato</option>
                    <option value="Ave" th:selected="${especieSeleccionada == 'Ave'}">Ave</option>
                </select>
                <div class="input-busqueda">
                    <i class="fa-solid fa-tag"></i>
                    <input type="text" name="raza" th:value="${razaSeleccionada}" placeholder="Raza...">
                </div>
                <button type="submit" class="boton-filtrar">Filtrar</button>
            </form>
            <a th:href="@{/mascotas}" href="#" class="boton-limpiar">
                <i class="fa-solid fa-xmark"></i> Limpiar
            </a>
        </div>

        <!-- Tabla -->
        <div class="contenedor-tabla">
            <table class="tabla-mascotas">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Especie / Raza</th>
                        <th>Fecha Nac.</th>
                        <th>Dueño</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${mascotas}">
                        <td class="col-nombre" th:text="${m.nombre}"></td>
                        <td>
                            <span class="etiqueta-especie" th:text="${m.especie}"></span>
                            <span class="col-raza" th:text="${m.raza}"></span>
                        </td>
                        <td th:text="${#temporals.format(m.fechaNacimiento, 'dd/MM/yyyy')} ?: 'No registrada'"></td>
                        <td th:text="${m.cliente?.usuario?.nombreCompleto} ?: 'Sin asignar'"></td>
                        <td class="col-acciones">
                            <a th:href="@{/mascotas/editar/{id}(id=${m.id})}" class="boton-editar"><i class="fa-solid fa-pen"></i></a>
                            <a th:href="@{/mascotas/eliminar/{id}(id=${m.id})}" class="boton-eliminar" onclick="return confirm('¿Eliminar esta mascota?')"><i class="fa-solid fa-trash"></i></a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pie -->
        <div class="tabla-pie">
            Se han encontrado <strong th:text="${mascotas.size()}">0</strong> mascotas.
        </div>

    </div>

</main>
  <!-- FOOTER -->
    <footer th:replace="~{common/navfooter :: pie}"></footer>

</body>
</html>
