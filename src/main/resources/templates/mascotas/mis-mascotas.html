<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{common/fragments :: head}"></th:block>
    <title>Mis Mascotas - SanityPet</title>
    <style>
        .pets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .pet-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            border-left: 5px solid var(--brand); /* El color de tu marca */
            position: relative;
        }
        .pet-card:hover {
            transform: translateY(-5px);
        }
        .pet-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .pet-info h3 {
            margin: 0;
            color: #2d3748;
        }
        .pet-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            background: #edf2f7;
            font-size: 0.85rem;
            color: #4a5568;
            margin-top: 5px;
        }
        .no-pets {
            text-align: center;
            padding: 50px;
            background: #f8fafc;
            border-radius: 15px;
            border: 2px dashed #cbd5e0;
        }
    </style>
</head>
<body>
    <header th:replace="~{common/fragments :: navbar}"></header>

    <main class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <div>
                <h1>🐾 Mis Mascotas</h1>
                <p>Aquí puedes ver a todos tus compañeros peludos registrados.</p>
            </div>
            <a th:href="@{/mascotas/nueva}" class="btn-action" style="text-decoration: none;">+ Registrar Nueva</a>
        </div>

        <div th:if="${#lists.isEmpty(mascotas)}" class="no-pets">
            <h3>¡Aún no tienes mascotas registradas!</h3>
            <p>Haz clic en el botón superior para añadir a tu primer compañero.</p>
        </div>

        <div class="pets-grid" th:if="${!#lists.isEmpty(mascotas)}">
            <div th:each="m : ${mascotas}" class="pet-card">
                <div class="pet-icon" th:text="${m.especie == 'Perro' ? '🐶' : (m.especie == 'Gato' ? '🐱' : '🐾')}"></div>
                
                <div class="pet-info">
                    <h3 th:text="${m.nombre}">Nombre</h3>
                    <span class="pet-badge" th:text="${m.especie + ' - ' + m.raza}">Especie - Raza</span>
                    
                    <div style="margin-top: 15px; font-size: 0.9rem; color: #718096;">
                        <p><strong>Nacimiento:</strong> <span th:text="${m.fechaNacimiento != null ? #temporals.format(m.fechaNacimiento, 'dd/MM/yyyy') : 'No registrada'}"></span></p>
                    </div>
                </div>

                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <a th:href="@{/citas/reservar(mascotaId=${m.id})}" style="color: var(--brand); font-weight: bold; text-decoration: none; font-size: 0.9rem;">📅 Pedir Cita</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
