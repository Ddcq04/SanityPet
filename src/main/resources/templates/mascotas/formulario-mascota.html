<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <th:block th:replace="~{common/fragments :: head}"></th:block>
    <title th:text="${mascota.id == null ? 'Nueva Mascota' : 'Editar Mascota'} + ' - SanityPet'"></title>
</head>
<body>
    <header th:replace="~{common/fragments :: navbar}"></header>

    <main class="container">
        <div class="card" style="max-width: 600px; margin: auto;">
            <h1 th:text="${mascota.id == null ? '🐾 Registrar Mascota' : '✏️ Editar Mascota'}"></h1>
            <p>Completa la información del paciente.</p>

            <form th:action="@{/mascotas/guardar}" th:object="${mascota}" method="post">
                
                <input type="hidden" th:field="*{id}">

                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Nombre de la Mascota:</label>
                    <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Toby" required>
                </div>

                <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Especie:</label>
                        <select th:field="*{especie}" class="form-control" required>
                            <option value="Perro">Perro</option>
                            <option value="Gato">Gato</option>
                            <option value="Ave">Ave</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Raza:</label>
                        <input type="text" th:field="*{raza}" class="form-control" placeholder="Ej: Labrador">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label>Fecha de Nacimiento:</label>
                    <input type="date" th:field="*{fechaNacimiento}" class="form-control">
                </div>

                <div class="form-group" sec:authorize="hasRole('admin')" style="margin-bottom: 25px; padding: 15px; background: #f8fafc; border-radius: 8px;">
                    <label style="font-weight: bold; color: var(--brand);">Asignar a Propietario:</label>
                    <select th:field="*{cliente}" class="form-control">
                        <option value="">-- Seleccionar Cliente --</option>
                        <option th:each="cl : ${todosClientes}" 
						        th:value="${cl.id}" 
						        th:text="${cl.dni + ' - ' + (cl.usuario != null ? cl.usuario.nombreCompleto : 'Sin nombre')}">
						</option>
                    </select>
                    <small style="color: #64748b;">Si se deja vacío y eres cliente, se te asignará automáticamente.</small>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn-action" style="flex: 1;">💾 Guardar Mascota</button>
                    <a th:href="@{/mascotas}" class="btn-del" style="flex: 1; text-align: center; text-decoration: none; line-height: 2.5;">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
