<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Mascota</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/common/navfooter.css}">
    <link rel="stylesheet" th:href="@{/css/mascotas/formulariomascota.css}">
</head>
<body>

<header th:replace="~{common/navfooter :: navbar}">
    <!-- navbar -->
</header>

<main class="contenido-principal">

    <div class="cabecera-pagina">
        <h1 class="titulo-pagina">Registrar Mascota</h1>
        <p class="subtitulo-pagina">Completa la información del nuevo paciente</p>
    </div>

    <div class="tarjeta-formulario">

        <form th:action="@{/mascotas/guardar}" th:object="${mascota}" method="post">

            <!-- Datos básicos -->
            <div class="seccion">
                <p class="seccion-titulo">Datos básicos</p>

                <div class="campo-grupo">
                    <label class="campo-etiqueta" for="nombre">Nombre de la mascota</label>
                    <input class="campo-input" type="text" id="nombre" th:field="*{nombre}" placeholder="Ej: Toby" required>
                </div>

                <!-- Especie -->
                <div class="campo-grupo">
                    <label class="campo-etiqueta" for="especie">Especie</label>
                    <select class="campo-select" id="especie" th:field="*{especie}" required>
                        <option value="Perro">Perro</option>
                        <option value="Gato">Gato</option>
                        <option value="Ave">Ave</option>
                        <option value="Otro">Otro</option>
                    </select>
                </div>

                <div class="fila-dos">
                    <div class="campo-grupo">
                        <label class="campo-etiqueta" for="raza">Raza</label>
                        <input class="campo-input" type="text" id="raza" th:field="*{raza}" placeholder="Ej: Labrador">
                    </div>
                    <div class="campo-grupo">
                        <label class="campo-etiqueta" for="fechaNacimiento">Fecha de nacimiento</label>
                        <input class="campo-input" type="date" id="fechaNacimiento" th:field="*{fechaNacimiento}">
                    </div>
                </div>
            </div>

            <!-- Propietario (solo admin) -->
            <div class="seccion seccion-propietario" sec:authorize="hasRole('admin')">
                <p class="seccion-titulo">Propietario</p>
                <p class="seccion-desc">Si se deja vacío y eres cliente, se te asignará automáticamente.</p>
                <div class="campo-grupo">
                    <label class="campo-etiqueta" for="cliente">Asignar a cliente</label>
                    <select class="campo-select" id="cliente" th:field="*{cliente}">
                        <option value="">-- Seleccionar cliente --</option>
                        <option th:each="c : ${todosClientes}"
                                th:value="${c.id}"
                                th:text="${c.dni} + ' - ' + ${c.usuario.nombreCompleto}">
                        </option>
                    </select>
                </div>
            </div>

            <!-- Botones -->
            <div class="botones-fila">
                <a th:href="@{/mascotas/mis-mascotas}" class="boton-cancelar">Cancelar</a>
                <button type="submit" class="boton-guardar">Guardar Mascota</button>
            </div>

        </form>

    </div>

</main>
  <!-- FOOTER -->
    <footer th:replace="~{common/navfooter :: pie}"></footer>

</body>
</html>
