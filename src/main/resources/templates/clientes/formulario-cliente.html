<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{common/fragments :: head}"></th:block>
    <title>Formulario Cliente - SanityPet</title>
    <style>
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <header th:replace="~{common/fragments :: navbar}"></header>

    <main class="container">
        <div class="card" style="max-width: 500px; margin: auto;">
            <h1 th:text="${cliente.id == null} ? '🆕 Nuevo Cliente' : '✏️ Editar Cliente'"></h1>
            <hr style="margin-bottom: 20px; border: 0; border-top: 1px solid #eee;">

            <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="form-group">
                    <label>DNI / Documento:</label>
                    <input type="text" th:field="*{dni}" class="form-control" required placeholder="12345678X">
                </div>

                <div class="form-group">
                    <label>Teléfono de contacto:</label>
                    <input type="text" th:field="*{telefono}" class="form-control" required placeholder="600 000 000">
                </div>

                <div style="margin-top: 25px; display: flex; gap: 10px;">
                    <button type="submit" class="btn-action" style="flex: 1; border: none;">Guardar Cliente</button>
                    <a th:href="@{/clientes}" class="btn-action" style="flex: 1; background: #94a3b8; text-align: center;">Cancelar</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
