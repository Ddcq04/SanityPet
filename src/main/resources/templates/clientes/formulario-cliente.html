<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{common/fragments :: head}"></th:block>
    <title>Formulario Cliente - SanityPet</title>
    <style>
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
    	.text-danger { color: #dc3545; font-size: 0.85rem; margin-top: 5px; display: block; }
    	.is-invalid { border-color: #dc3545 !important; }
    </style>
</head>
<body>
    <header th:replace="~{common/fragments :: navbar}"></header>

    <main class="container">
        <div class="card" style="max-width: 500px; margin: auto;">
            <h1 th:text="${cliente.id == null} ? '🆕 Nuevo Cliente' : '✏️ Editar Cliente'"></h1>
            <hr style="margin-bottom: 20px; border: 0; border-top: 1px solid #eee;">

            <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post">
			    <input type="hidden" th:field="*{id}">
				<input type="hidden" th:field="*{usuario.id}">
				
			    <div class="form-group">
			        <label>DNI / Documento:</label>
			        <input type="text" th:field="*{dni}" class="form-control" 
			               th:classappend="${#fields.hasErrors('dni')} ? 'is-invalid' : ''" required>
			        <small class="text-danger" th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}"></small>
			    </div>
			    
			    <div class="form-group">
			        <label>Nombre completo:</label>
			        <input type="text" th:field="*{usuario.nombreCompleto}" class="form-control"
			               th:classappend="${#fields.hasErrors('usuario.nombreCompleto')} ? 'is-invalid' : ''" required>
			        <small class="text-danger" th:if="${#fields.hasErrors('usuario.nombreCompleto')}" th:errors="*{usuario.nombreCompleto}"></small>
			    </div>
			
			    <div class="form-group">
			        <label>Teléfono de contacto (Opcional):</label>
			        <input type="text" th:field="*{telefono}" class="form-control">
			    </div>
			    
			    <div class="form-group">
			        <label>Email (Opcional):</label>
			        <input type="email" th:field="*{email}" class="form-control"
			               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">
			        <small class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></small>
			    </div>
			    
			    <div class="form-group">
				    <label>Contraseña:</label>
				    <input type="password" th:field="*{usuario.passwordPlana}" class="form-control" 
				           th:classappend="${#fields.hasErrors('usuario.passwordPlana')} ? 'is-invalid' : ''"
				           th:required="${cliente.id == null}">
				    <small class="text-danger" th:if="${#fields.hasErrors('usuario.passwordPlana')}" 
				           th:errors="*{usuario.passwordPlana}"></small>
				</div>
				
				<div class="form-group">
				    <label>Repetir Contraseña:</label>
				    <input type="password" th:field="*{usuario.passwordRepeat}" class="form-control" 
				           th:classappend="${#fields.hasErrors('usuario.passwordRepeat')} ? 'is-invalid' : ''"
				           th:required="${cliente.id == null}">
				    <small class="text-danger" th:if="${#fields.hasErrors('usuario.passwordRepeat')}" 
				           th:errors="*{usuario.passwordRepeat}"></small>
				</div>
			
			    <div style="margin-top: 25px; display: flex; gap: 10px;">
			        <button type="submit" class="btn-action" style="flex: 1; border: none;">Guardar Cliente</button>
			        <a th:href="@{/clientes}" class="btn-action" style="background: #94a3b8; flex: 1; text-align: center;">Cancelar</a>
			    </div>
			</form>
        </div>
    </main>
</body>
<script>
    const pass1 = document.getElementById('usuario.passwordPlana');
    const pass2 = document.getElementById('usuario.passwordRepeat');

    pass2.addEventListener('input', () => {
        if (pass1.value !== pass2.value) {
            pass2.setCustomValidity('Las contraseñas no coinciden');
        } else {
            pass2.setCustomValidity('');
        }
    });
</script>
</html>
